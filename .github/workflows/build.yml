name: Build index.html

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate regular index.html
        run: node build.js

      - name: Generate goofy index.html
        run: node build.js goofy.json index_goofy.html

      - name: Commit if changed
        run: |
          git diff --quiet index.html && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html index_goofy.html
          git commit -m "Regenerate index.html [skip ci]"
          git push
